<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- GitHub Corner -->

    <div class="app">
      <header>
        <nav>
          <img src="imgs/pixl2.gif" alt="divider stars" />
          <a href="watchlist.html">My Watchlist</a>
          <img src="imgs/pixl2.gif" alt="divider stars" />
        </nav>

        <div class="window-section">
          <div class="window-title">
            Movie Watchlist.app
            <img class="win-icon" src="imgs/win.webp" alt="x" />
          </div>

          <div class="window-main">
            <span class="intro">
              <img src="imgs/pixl1.gif" alt="cute green ghost" />
              <p>
                Search for movies, build your watchlist, revisit later.<br />
                No algorithms. No nonsense. Just you and your films.
              </p>
            </span>
            <div class="search-bar">
              <input
                type="search"
                id="searchInput"
                placeholder="Search for a film…"
              />
              <button id="searchBtn" type="button">Search</button>
            </div>
          </div>
        </div>
      </header>

      <main>
        <div class="window-section">
          <div class="window-title">
            Search Results
            <img class="win-icon" src="imgs/win.webp" alt="x" />
          </div>

          <div class="window-main">
            <div class="results" id="results">
              <span class="message" id="message"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="32"
                  height="32"
                  viewBox="0 0 32 32"
                >
                  <path
                    fill="currentColor"
                    d="M25.14 0v1.52h3.05v1.53h1.52v1.52h-3.04V3.05h-1.53V1.52h-6.09v1.53h3.04v1.52h1.53v1.52h-3.05V4.57h-1.52V3.05h-6.1v1.52H16v1.52h1.52v1.53h-3.04V6.09h-1.53V4.57H6.86v1.52H9.9v1.53h1.53v1.52H8.38V7.62H6.86V6.09H.76v24.38h1.53V19.81h27.42v10.66h1.53V13.71H2.29v-1.52h4.57v-1.53h6.09V9.14h6.1V7.62h6.09V6.09h6.1V0Zm0 16.76h1.53v-1.52h3.04v1.52h-1.52v1.52h-3.05Zm-7.62 0h1.53v-1.52h3.04v1.52h-1.52v1.52h-3.05Zm-7.62 0h1.53v-1.52h3.05v1.52h-1.53v1.52H9.9Zm-6.09 0v-1.52h3.05v1.52H5.33v1.52H2.29v-1.52Zm1.52-6.1H2.29V7.62h1.52v1.52h1.52ZM2.29 30.47h27.42V32H2.29Z"
                  />

                    fill="currentColor"
                    d="M26.67 22.86h-1.53v1.52h-1.52v-1.52h-1.53v1.52h-1.52v1.52h1.52v1.53h1.53v1.52h1.52v-1.52h1.53V25.9h1.52v-1.52h-1.52zM6.86 25.9h10.66v1.53H6.86Zm0-3.04h10.66v1.52H6.86Z"
                  /></svg
                ><br />Start exploring</span
              >
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
